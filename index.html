  <main>

  <footer class="container">

  <template id="home-template">
    <div class="jumbotron">
      <div class="container">
        <h1 tabindex="-1">Welcome to Empower Ability Labs!</h1>
        <p>
          Empower Ability Labs is a hub for learning and empathy-building. We
          are on a mission to foster understanding and promote inclusive
          digital experiences for all. We offer a range of services designed
          to promote accessibility awareness, drive inclusivity, and enhance
          the user experience. And help you find answers on How do people with
          disabilities use technology and navigate the digital world? What
          tools do they employ?
        </p>
      </div>
    </div>

    <div class="container">
      <!-- Example row of columns -->
      <div class="row">
        <div class="col-md-4">
          <button id="openModal">Meet the Empower Community!</button>
        </div>
        <div class="col-md-4">
          <div class="modal-backdrop" hidden></div>
          <div class="home-modal" role="dialog" aria-labelledby="modal-title" aria-modal="true" aria-hidden="true"
            hidden>
            <h2 id="modal-title" tabindex="-1">
              Community Steering Committee
            </h2>
            <p>
              We get an aha! moments from product managers who try our
              services for the first time. We offered many lab days, workshops
              and offered usability testing services to many companies and
              organizations including:
            </p>
            <ul>
              <li>McGill University</li>
              <li>Walmart.ca</li>
              <li>Apple.ca</li>
              <li>Google.ca</li>
              <li>Government of Canada</li>
            </ul>
            <button id="closeModal">Close</button>
          </div>
        </div>
        <div class="col-md-4">
          <p>
            Donec id elit non mi porta gravida at eget metus. Fusce dapibus,
            tellus ac cursus commodo.
          </p>
        </div>

        <section class="container mt-4" aria-labelledby="community-section-title">
          <h2 id="community-section-title" class="mb-4">
            Explore Our Community
          </h2>

          <div class="row">
            <!-- Card 1 -->
            <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
              <article class="card h-100 border-0 shadow-none">
                <div class="card-body">
                  <h3 class="card-title">Our Approach</h3>
                  <p class="card-text">
                    Empower Ability Labs utilizes a hands-on approach to raise awareness and promote empathy.
                    Our immersive workshops and lab days provide participants with a unique opportunity to step
                    into the shoes of individuals with disabilities and navigate the world from their perspective.
                  </p>
                  <a href="https://www.google.com/search/howsearchworks/our-approach/" class="btn btn-link"
                    aria-label="Learn more about our approach">
                    Learn more
                  </a>
                </div>
              </article>
            </div>

            <!-- Card 2 -->
            <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
              <article class="card h-100 border-0 shadow-none">
                <div class="card-body">
                  <h3 class="card-title">Services</h3>
                  <p class="card-text">
                    Promote accessibility awareness and enhance the user experience.
                  </p>
                  <ul>
                    <li>Empathy lab days and workshops</li>
                    <li>Go beyond WCAG compliance!</li>
                    <li>Inspirational speakers.</li>
                  </ul>
                  <a href="https://www.elevenways.be/en/services" class="btn btn-link"
                    aria-label="Learn more about services">
                    Learn more
                  </a>
                </div>
              </article>
            </div>

            <!-- Card 3 -->
            <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
              <article class="card h-100 border-0 shadow-none">
                <div class="card-body">
                  <h3 class="card-title">Testimonials</h3>
                  <p class="card-text">
                    Invite a speaker with disabilities to share their unique
                    journey. This captivating addition to your upcoming event
                    will offer insights that resonate, inspire, educate, and
                    enrich your team's understanding of inclusion.
                  </p>
                  <a href="https://dictionary.cambridge.org/us/dictionary/english/testimonial" class="btn btn-link"
                    aria-label="Learn more about testimonials">
                    Learn more
                  </a>
                </div>
              </article>
            </div>
          </div>
        </section>

      </div>

      <hr />
    </div>
    <!-- /container -->
  </template>

  <template id="services-template">
    <!-- Main landing view -->
    <div class="jumbotron">
      <div class="container">
        <h1 tabindex="-1">Services</h1>

        <section id="services-intro">
          <p>
            Dedicated space or programs designed to cultivate empathy and understanding among
            individuals towards the challenges faced by people with disabilities in using
            technology and interacting with various environments.
          </p>
          <div class="deco-image">
            <img src="CST8914-final/images/services.png" alt="" />
          </div>
        </section>
      </div>
    </div>

    <div class="container">
      <section id="services-list">
        <article>
          <h2>Empathy Lab Days and Workshops</h2>
          <p>
            The lab days and workshops provide hands-on experiences, simulations, and interactions
            with assistive technologies, tools, and scenarios that replicate the obstacles individuals
            with disabilities encounter daily.
          </p>
        </article>

        <article>
          <h2>Inspirational speakers</h2>
          <p>
            Invite a speaker with disabilities to take share their unique journey. This captivating
            addition to your upcoming event will offer insights that resonate, inspire, educate, and
            enrich your team collective understanding of inclusion.
          </p>
        </article>

        <article>
          <h2>Usability Testing</h2>
          <p>
            Go beyond WCAG. Involve individuals with disabilities in usability testing to gather
            valuable insights for refining product strategy and identifying accessibility concerns
            early, when solutions are more feasible and cost-effective.
            You have access to a diverse community of people with disabilities who use various
            assistive technologies. With expertise ranging from novice to expert, this community
            can support your product lifecycle from user research to design and quality assurance.
          </p>
        </article>

      </section>

      <hr />
    </div>
    <!-- /container -->
  </template>

  <template id="schedule-template">
    <!-- Main landing view -->
    <div class="jumbotron">
      <div class="container">
        <h1 tabindex="-1">Schedule a call</h1>

        <section id="schedule-main">
          <article>
            <p>At Empower Ability Labs, we are dedicated to cultivating empathy
              and driving positive change through immersive experiences.
              Fill out the form below and we'll get back to you as soon as we
              can to schedule a call with our sales team!</p>
            <div class="deco-image">
              <img src="CST8914-final/images/scheduleacall.png" alt="" />
            </div>
          </article>
        </section>

        <section class="p-4 m-2" id="form-section">
          <article>
            <form action="#" method="post">
              <label for="name-input" class="pr-5">Business Name: (required)</label>
              <input id="name-input" type="text" required/>
              <br />
              <label for="phone-input" class="pr-5">Phone Number (613-123-1234):</label>
              <input id="phone-input" type="tel" pattern="^\d{3}-\d{3}-\d{4}$"/>
              <br />
              <label for="email-input" class="pr-5">Email: (required)</label>
              <input id="email-input" type="email" required />
              <hr>
              <fieldset class="checkbox-container">
                <legend>What would you like to talk about:</legend>
                <ul class="checkboxes">
                  <li>
                    <label>
                      <input type="checkbox" name="topics" value="awareness" />
                      Awareness lab days and workshops
                    </label>
                  </li>

                  <li>
                    <label>
                      <input id="speaker" type="checkbox" name="topics" value="speaker" />
                      Invite a speaker with disabilities to your event
                    </label>
                  </li>

                  <li>
                    <label>
                      <input type="checkbox" name="topics" value="testing" />
                      Usability testing
                    </label>
                  </li>
                </ul>
              </fieldset>

              <div id="speaker-extra" hidden>
                <h2>Tell us about your event</h2>
                <textarea name="event-description" id="event-descr"></textarea>
              </div>

              <br />
              <label id="toggle-label" for="id-switch-1">
                <span class="label">
                  Receive emails about updates and services
                </span>
                <input id="id-switch-1" type="checkbox" role="switch" />
                <span class="state">
                  <span class="container">
                    <span class="position"> </span>
                  </span>
                  <span class="on" aria-hidden="true"> Yes </span>
                  <span class="off" aria-hidden="true"> No </span>
                </span>
              </label>
              <button id="submit-btn" class="btn">Schedule a
                call</button>
            </form>
          </article>
        </section>
      </div>

      <hr />
    </div>
    <!-- /container -->

  </template>

  <script src="https://cdn.rawgit.com/visionmedia/page.js/master/page.js"></script>
  <script src="EmpowerAbilityLab.js"></script>
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

</html>
