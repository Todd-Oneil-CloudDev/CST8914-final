  <template id="schedule-template">
    <!-- Main landing view -->
    <div class="jumbotron">
      <div class="container">
        <h1 tabindex="-1">Schedule a call</h1>

        <section id="schedule-main">
          <article>
            <p>At Empower Ability Labs, we are dedicated to cultivating empathy
              and driving positive change through immersive experiences.
              Fill out the form below and we'll get back to you as soon as we
              can to schedule a call with our sales team!</p>
            <div class="schedule-image">
              <img src="CST8914-final/images/scheduleacall.png" alt="" />
            </div>
          </article>
        </section>

        <section class="p-4 m-2" id="form-section">
          <article>
            <form action="#" method="post">
              <label for="name-input" class="pr-5">Business Name:</label>
              <input id="name-input" type="text" />
              <br />
              <label for="phone-input" class="pr-5">Phone Number (613-123-1234):</label>
              <input id="phone-input" type="tel" />
              <br />
              <label for="email-input" class="pr-5">Email: (required)</label>
              <input id="email-input" type="email" required />
              <hr>
              <fieldset class="checkbox-container">
                <legend>What would you like to talk about:</legend>
                <ul class="checkboxes">
                  <li>
                    <label>
                      <input type="checkbox" name="topics" value="awareness" />
                      Awareness lab days and workshops
                    </label>
                  </li>

                  <li>
                    <label>
                      <input id="speaker" type="checkbox" name="topics" value="speaker" />
                      Invite a speaker with disabilities to your event
                    </label>
                  </li>

                  <li>
                    <label>
                      <input type="checkbox" name="topics" value="testing" />
                      Usability testing
                    </label>
                  </li>
                </ul>
              </fieldset>

              <div id="speaker-extra" hidden>
                <h2>Tell us about your event</h2>
                <textarea name="event-description" id="event-descr"></textarea>
              </div>

              <br />
              <label id="toggle-label" for="id-switch-1">
                <span class="label">
                  Receive emails about updates and services
                </span>
                <input id="id-switch-1" type="checkbox" role="switch" />
                <span class="state">
                  <span class="container">
                    <span class="position"> </span>
                  </span>
                  <span class="on" aria-hidden="true"> Yes </span>
                  <span class="off" aria-hidden="true"> No </span>
                </span>
              </label>
              <button id="submit-btn" class="btn">Schedule a
                call</button>
            </form>
          </article>
        </section>
      </div>

      <hr />
    </div>
    <!-- /container -->
