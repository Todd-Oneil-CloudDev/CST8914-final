<!doctype html>
<html lang="en">

<head>
  <title>Empower Ability Labs</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description"
    content="Foster understanding and promote inclusive digital experiences for all" />
  <meta name="author" content="" />
  <!-- Bootstrap core CSS -->
  <link
    href="https://getbootstrap.com/docs/4.0/examples/jumbotron/jumbotron.css"
    rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
    crossorigin="anonymous" />
  <!-- Custom styles for Empower Ability Labs -->
  <link rel="stylesheet" href="EmpowerAbilityLab.css" />
  <title>Empower Ability Labs</title>
</head>

<body>
  <header>
    <img src="./images/empowerabilitylabslogo.png" alt="EmpowerAbilityLab Logo"
      class="navbar-brand" />
    <!-- Main Navigation for Empower Ability Labs-->
    <nav>
      <div id="navbar">
        <a href="/home">Home</a>
        <a href="/services">Services</a>
        <a href="/schedule">Schedule a call</a>
      </div>
    </nav>
  </header>
  <main></main>

  <footer class="container">
    <p>Copyright Accessible Knowledge Base 2023</p>
  </footer>

  <template id="home-template">
    <div class="jumbotron">
      <div class="container">
        <h1 tabindex="-1">Welcome to Empower Ability Labs!</h1>
        <p>
          Empower Ability Labs is a hub for learning and empathy-building. We
          are on a mission to foster understanding and promote inclusive
          digital experiences for all. We offer a range of services designed
          to promote accessibility awareness, drive inclusivity, and enhance
          the user experience. And help you find answers on How do people with
          disabilities use technology and navigate the digital world? What
          tools do they employ?
        </p>
      </div>
    </div>

    <div class="container">
      <!-- Example row of columns -->
      <div class="row">
        <div class="col-md-4">
          <button id="openModal">Meet the Empower Community!</button>
        </div>
        <div class="col-md-4">
          <div class="modal-backdrop" hidden></div>
          <div class="home-modal" role="dialog" aria-labelledby="modal-title"
            aria-modal="true" aria-hidden="true" hidden>
            <h2 id="modal-title" tabindex="-1">
              Community Steering Committee
            </h2>
            <p>
              We get an aha! moments from product managers who try our
              services for the first time. We offered many lab days, workshops
              and offered usability testing services to many companies and
              organizations including:
            </p>
            <ul>
              <li>McGill University</li>
              <li>Walmart.ca</li>
              <li>Apple.ca</li>
              <li>Google.ca</li>
              <li>Government of Canada</li>
            </ul>
            <button id="closeModal">Close</button>
          </div>
        </div>
        <div class="col-md-4">
          <p>
            Donec id elit non mi porta gravida at eget metus. Fusce dapibus,
            tellus ac cursus commodo.
          </p>
        </div>
      </div>

      <hr />
    </div>
    <!-- /container -->
  </template>

  <template id="services-template">
    <!-- Main landing view -->
    <div class="jumbotron">
      <div class="container">
        <h1 tabindex="-1">Services Page!</h1>
        <p>
          Donec id elit non mi porta gravida at eget metus. Fusce dapibus,
          tellus ac cursus commodo, tortor mauris condimentum nibh, ut
          fermentum massa justo sit amet risus. Etiam porta sem malesuada
          magna mollis euismod. Donec sed odio dui.
        </p>
      </div>
    </div>

    <div class="container">
      <!-- Example row of columns -->
      <div class="row">
        <div class="col-md-4">
          <p>This is the Services page.</p>
        </div>
        <div class="col-md-4">
          <p>
            Donec id elit non mi porta gravida at eget metus. Fusce dapibus,
            tellus ac cursus commodo.
          </p>
        </div>
        <div class="col-md-4">
          <p>
            Donec id elit non mi porta gravida at eget metus. Fusce dapibus,
            tellus ac cursus commodo.
          </p>
        </div>
      </div>

      <hr />
    </div>
    <!-- /container -->
  </template>

  <template id="schedule-template">
    <!-- Main landing view -->
    <div class="jumbotron">
      <div class="container">
        <h1 tabindex="-1">Schedule Page</h1>

        <section id="schedule-main">
          <article>
            <p>At Empower Ability Labs, we are dedicated to cultivating empathy
              and driving positive change through immersive experiences.
              Fill out the form below and we’ll get back to you as soon as we
              can to schedule a call with our sales team!</p>
          </article>
        </section>

        <section class="p-4 m-2" id="form-section">
          <article>
            <form action="#" method="post">
              <label for="name-input" class="pr-5">Business name</label><input
                id="name-input" type="text"
                aria-describedby="please enter your business name" />
              <br />
              <label for="phone-input" class="pr-5">Phone Number</label><input
                id="phone-input" type="text" placeholder="e g 613-123-4567" />
              <br />
              <label for="email-input" class="pr-5">Email</label><input
                id="email-input" type="email" required />

              <h5></h5>
              <div class="checkbox-container">
                <ul class="form-checkboxes">
                  <li>
                    <input type="checkbox" class="mr-2" id="item1" /><label
                      for="item1">Awareness lab days and workshops</label>
                  </li>
                  <li>
                    <input type="checkbox" class="mr-2" id="item2" /><label
                      for="item2">Invite a speaker with disabilities to your
                      event</label>
                  </li>
                  <li>
                    <input type="checkbox" class="mr-2" id="item3" /><label
                      for="item3">Usability testing</label>
                  </li>
                </ul>
              </div>

              <h4>Tell us about your event</h4>
              <textarea name="event-description" id="event-descr"
                aria-describedby="Please tell us about your event"></textarea>
              <br />
              <label id="toggle-label">
                <span class="label">
                  Receive emails about updates and services
                </span>
                <input id="id-switch-1" type="checkbox" role="switch" />
                <span class="state">
                  <span class="container">
                    <span class="position"> </span>
                  </span>
                  <span class="on" aria-hidden="true"> On </span>
                  <span class="off" aria-hidden="true"> Off </span>
                </span>
              </label>

              <button>Schedule a call</button>
            </form>
          </article>
        </section>
      </div>

      <hr />
    </div>
    <!-- /container -->
  </template>

  <script
    src="https://cdn.rawgit.com/visionmedia/page.js/master/page.js"></script>
  <script src="EmpowerAbilityLab.js"></script>

</html>
